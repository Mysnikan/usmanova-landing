<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Программа тренировок</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    >
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="program-page">
      <a class="back-link" href="index.html#programs">Назад к программам</a>
      <article class="program-detail" id="program-detail">
        <div class="program-detail__media">
          <img id="program-image" src="assets/method.webp" alt="">
        </div>
        <div class="program-detail__text">
          <span class="program-card__label" id="program-type">Программа</span>
          <h1 id="program-title">Метод Усмановой</h1>
          <p id="program-description">
            Подробная информация о программе появится здесь позже.
          </p>
          <p class="program-detail__note">Сейчас это короткая карточка выбранного направления.</p>
          <a class="button button--primary" href="index.html#programs">Выбрать другую программу</a>
        </div>
      </article>
    </main>
    <script src="script.js"></script>
  </body>
</html>
